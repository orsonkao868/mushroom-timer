<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="香菇計時">
<title>🍄 香菇計時器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap');

  :root {
    --bg: #0e1a0f;
    --surface: #162018;
    --surface2: #1e2e20;
    --border: #2a402c;
    --green: #4ecb6a;
    --green-dim: #2a6e3a;
    --amber: #f0a830;
    --red: #e05050;
    --text: #d8eeda;
    --text-muted: #6a8c6e;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans TC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top, 12px) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    overflow-x: hidden;
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 8px;
  }
  header h1 { font-size: 15px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.05em; }
  #clock { font-family: var(--mono); font-size: 14px; color: var(--text-muted); }

  .slots { flex: 1; display: flex; flex-direction: column; gap: 10px; padding: 8px 16px; overflow-y: auto; }

  .slot {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto auto;
    gap: 10px 12px;
    transition: border-color 0.3s;
  }
  .slot.running { border-color: var(--green-dim); }
  .slot.urgent  { border-color: var(--amber); }
  .slot.done    { border-color: var(--red); animation: pulse 0.7s ease-in-out infinite alternate; }
  @keyframes pulse { from { border-color: var(--red); } to { border-color: #803030; } }

  .slot-left { grid-column: 1; grid-row: 1; display: flex; flex-direction: column; gap: 4px; }
  .slot-name-row { display: flex; align-items: center; gap: 8px; }
  .slot-name {
    font-size: 13px; color: var(--text-muted);
    background: none; border: none; outline: none;
    font-family: var(--sans); color: var(--text-muted);
    width: 120px;
  }
  .slot-name::placeholder { color: var(--text-muted); opacity: 0.5; }

  .slot-time {
    font-family: var(--mono);
    font-size: 44px; font-weight: 500; line-height: 1;
    letter-spacing: -2px;
    color: var(--text);
    transition: color 0.3s;
  }
  .slot.idle .slot-time { color: var(--text-muted); font-size: 28px; line-height: 1.4; }
  .slot.running .slot-time { color: var(--green); }
  .slot.urgent .slot-time { color: var(--amber); }
  .slot.done .slot-time { color: var(--red); font-size: 18px; line-height: 1; padding-top: 4px; }

  .slot-sub { font-size: 11px; color: var(--text-muted); min-height: 14px; }

  .slot-right { grid-column: 2; grid-row: 1 / 3; display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 8px; }

  .tap-btn {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 1px solid var(--green-dim);
    background: rgba(78,203,106,0.08);
    color: var(--green);
    font-size: 26px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
    flex-shrink: 0;
  }
  .tap-btn:active { transform: scale(0.9); }
  .slot.done .tap-btn { border-color: var(--red); background: rgba(224,80,80,0.1); color: var(--red); }
  .slot.running .tap-btn, .slot.urgent .tap-btn { border-color: var(--border); background: none; color: var(--text-muted); font-size: 16px; }

  .del-btn {
    background: none; border: none;
    color: var(--text-muted); font-size: 16px; cursor: pointer;
    opacity: 0.4; padding: 4px;
  }
  .del-btn:active { opacity: 1; color: var(--red); }

  .bar-row { grid-column: 1 / 3; grid-row: 2; }
  .slot.idle .bar-row { display: none; }

  .bar-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.9s linear, background 0.3s; }
  .slot.running .bar-fill { background: var(--green); }
  .slot.urgent .bar-fill { background: var(--amber); }
  .slot.done .bar-fill { background: var(--red); width: 100% !important; }

  .input-row {
    grid-column: 1 / 3; grid-row: 3;
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border-radius: 10px; padding: 8px 12px;
  }
  .input-row label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .input-row input[type=range] {
    flex: 1; accent-color: var(--green);
    height: 3px; cursor: pointer;
  }
  .input-row .val {
    font-family: var(--mono); font-size: 14px;
    color: var(--text); min-width: 36px; text-align: right;
  }
  .slot.running .input-row, .slot.urgent .input-row { opacity: 0.4; pointer-events: none; }
  .slot.done .input-row { display: none; }

  .bottom-bar {
    display: flex; gap: 10px; padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
  }
  .add-btn {
    flex: 1; padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted); font-size: 14px;
    cursor: pointer; font-family: var(--sans);
    transition: background 0.15s, color 0.15s;
  }
  .add-btn:active { background: var(--surface2); color: var(--text); }
  .reset-btn {
    padding: 14px 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-muted); font-size: 13px;
    cursor: pointer; font-family: var(--sans);
  }
  .reset-btn:active { color: var(--red); border-color: var(--red); }
</style>
</head>
<body>

<header>
  <h1>🍄 香菇計時器</h1>
  <span id="clock">--:--:--</span>
</header>

<div class="slots" id="slotList"></div>

<div class="bottom-bar">
  <button class="add-btn" onclick="addSlot()">＋ 新增香菇</button>
  <button class="reset-btn" onclick="resetAll()">全部重置</button>
</div>

<script>
const SPAWN = 5 * 60;
let slots = [];
let nextId = 1;
let audioCtx = null;
let alerted = new Set();

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem('pk_v3') || 'null');
    if (saved) {
      slots = saved.slots || [];
      nextId = saved.nextId || slots.length + 1;
    }
  } catch(e) {}
  if (slots.length === 0) {
    slots = [
      { id: nextId++, name: '香菇 1', extraMin: 0, endAt: null },
      { id: nextId++, name: '香菇 2', extraMin: 0, endAt: null },
      { id: nextId++, name: '香菇 3', extraMin: 0, endAt: null },
    ];
  }
}

function save() {
  try { localStorage.setItem('pk_v3', JSON.stringify({ slots, nextId })); } catch(e) {}
}

function getState(s) {
  if (!s.endAt) return 'idle';
  const rem = s.endAt - Date.now();
  if (rem <= 0) return 'done';
  if (rem <= 60000) return 'urgent';
  return 'running';
}

function fmt(ms) {
  const s = Math.max(0, Math.ceil(ms / 1000));
  const m = Math.floor(s / 60), sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function fmtClock(ts) {
  const d = new Date(ts);
  return [d.getHours(), d.getMinutes(), d.getSeconds()].map(v => String(v).padStart(2,'0')).join(':');
}

function beep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    [[880,0],[1100,0.2],[880,0.4]].forEach(([f,t]) => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value = f;
      const ct = audioCtx.currentTime + t;
      g.gain.setValueAtTime(0.3, ct);
      g.gain.linearRampToValueAtTime(0, ct + 0.15);
      o.start(ct); o.stop(ct + 0.18);
    });
  } catch(e) {}
  try { navigator.vibrate && navigator.vibrate([100,60,100,60,250]); } catch(e) {}
}

function startSlot(id) {
  const s = slots.find(x => x.id === id);
  if (!s) return;
  const totalSec = SPAWN + (s.extraMin * 60);
  s.endAt = Date.now() + totalSec * 1000;
  alerted.delete(id);
  save();
  renderSlot(id);
}

function resetSlot(id) {
  const s = slots.find(x => x.id === id);
  if (!s) return;
  s.endAt = null;
  alerted.delete(id);
  save();
  renderSlot(id);
}

function addSlot() {
  slots.push({ id: nextId++, name: `香菇 ${slots.length + 1}`, extraMin: 0, endAt: null });
  save();
  renderAll();
}

function removeSlot(id) {
  slots = slots.filter(s => s.id !== id);
  save();
  renderAll();
}

function resetAll() {
  slots.forEach(s => { s.endAt = null; alerted.delete(s.id); });
  save();
  renderAll();
}

function setExtra(id, val) {
  const s = slots.find(x => x.id === id);
  if (s) { s.extraMin = val; save(); }
}

function setName(id, val) {
  const s = slots.find(x => x.id === id);
  if (s) { s.name = val || s.name; save(); }
}

function renderAll() {
  const list = document.getElementById('slotList');
  list.innerHTML = '';
  slots.forEach(s => {
    const el = document.createElement('div');
    el.className = 'slot idle';
    el.id = 'slot-' + s.id;
    list.appendChild(el);
    renderSlot(s.id);
  });
}

function renderSlot(id) {
  const s = slots.find(x => x.id === id);
  const el = document.getElementById('slot-' + id);
  if (!s || !el) return;
  const state = getState(s);
  const rem = s.endAt ? Math.max(0, s.endAt - Date.now()) : 0;
  const totalMs = (SPAWN + s.extraMin * 60) * 1000;
  const pct = s.endAt ? Math.min(100, Math.round((1 - rem / totalMs) * 100)) : 0;
  const spawnAt = s.endAt ? fmtClock(s.endAt) : '';
  const totalLabel = `${SPAWN / 60 + s.extraMin} 分鐘`;

  let timeText = '';
  if (state === 'idle') timeText = `點擊開始\n${totalLabel}倒數`;
  else if (state === 'done') timeText = '🍄 可以打了！';
  else timeText = fmt(rem);

  let subText = '';
  if (state === 'running' || state === 'urgent') subText = `預計 ${spawnAt} 重生`;
  else if (state === 'done') subText = '再次點擊重新計時';

  let btnContent = '';
  if (state === 'idle') btnContent = '🍄';
  else if (state === 'done') btnContent = '↺';
  else btnContent = '✕';

  el.className = 'slot ' + state;
  el.innerHTML = `
    <div class="slot-left">
      <div class="slot-name-row">
        <input class="slot-name" value="${s.name}" placeholder="香菇名稱"
          onblur="setName(${id}, this.value)"
          onkeydown="if(event.key==='Enter') this.blur()"
          onclick="event.stopPropagation()"
        />
        <button class="del-btn" onclick="removeSlot(${id})" aria-label="刪除">✕</button>
      </div>
      <div class="slot-time" style="white-space:pre-line">${timeText}</div>
      <div class="slot-sub">${subText}</div>
    </div>
    <div class="slot-right">
      <button class="tap-btn" onclick="${state === 'idle' ? 'startSlot' : 'resetSlot'}(${id})" aria-label="計時">${btnContent}</button>
    </div>
    <div class="bar-row">
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="input-row">
      <label>香菇還要</label>
      <input type="range" min="0" max="15" step="0.5" value="${s.extraMin}"
        oninput="setExtra(${id}, parseFloat(this.value)); this.nextElementSibling.textContent = parseFloat(this.value) === 0 ? '已死' : parseFloat(this.value) + ' 分'"
        onclick="event.stopPropagation()"
      />
      <span class="val">${s.extraMin === 0 ? '已死' : s.extraMin + ' 分'}</span>
    </div>
  `;
}

function tick() {
  const now = Date.now();
  document.getElementById('clock').textContent = fmtClock(now);

  slots.forEach(s => {
    const state = getState(s);
    const el = document.getElementById('slot-' + s.id);
    if (!el) return;

    if (state === 'done' && !alerted.has(s.id)) {
      alerted.add(s.id);
      beep();
    }

    if (state === 'idle') return;

    const rem = s.endAt ? Math.max(0, s.endAt - now) : 0;
    const totalMs = (SPAWN + s.extraMin * 60) * 1000;
    const pct = Math.min(100, Math.round((1 - rem / totalMs) * 100));

    el.className = 'slot ' + state;

    const timeEl = el.querySelector('.slot-time');
    const subEl = el.querySelector('.slot-sub');
    const fillEl = el.querySelector('.bar-fill');
    const btnEl = el.querySelector('.tap-btn');

    if (timeEl) timeEl.textContent = state === 'done' ? '🍄 可以打了！' : fmt(rem);
    if (subEl) subEl.textContent = state === 'done' ? '再次點擊重新計時' : `預計 ${fmtClock(s.endAt)} 重生`;
    if (fillEl) fillEl.style.width = pct + '%';
    if (btnEl) {
      btnEl.textContent = state === 'done' ? '↺' : '✕';
      btnEl.onclick = state === 'done'
        ? () => resetSlot(s.id)
        : () => resetSlot(s.id);
    }
  });
}

loadState();
renderAll();
setInterval(tick, 500);
</script>
</body>
</html>
